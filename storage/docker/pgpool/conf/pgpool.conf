# This configuration file is for Pgpool-II in a Patroni-managed cluster.

listen_addresses = '*'
port = 9999
# log_min_messages = 'DEBUG5'

# --- Backend Definitions (Static) ---
# We must define all potential backend nodes here for version 4.6.
backend_hostname0 = 'pg-node-1'
backend_port0 = 5432
backend_weight0 = 1
backend_flag0 = 'ALLOW_TO_FAILOVER'

backend_hostname1 = 'pg-node-2'
backend_port1 = 5432
backend_weight1 = 1
backend_flag1 = 'ALLOW_TO_FAILOVER'

backend_hostname2 = 'pg-node-3'
backend_port2 = 5432
backend_weight2 = 1
backend_flag2 = 'ALLOW_TO_FAILOVER'

# --- Patroni Failover Integration ---
failover_command = '/usr/local/bin/patronictl switchover --master %M --candidate %H --force'
follow_primary_command = '/usr/local/bin/pcp_follow_primary -w -p %p -U postgres -h localhost --no-password %d'

# --- Health Checks ---
sr_check_period = 10
sr_check_user = 'appuser'
sr_check_password = 'my-secure-db-password' # Use your actual plaintext password

# Query Cache: Enabled for improved read performance on repeated queries.
memory_cache_enabled = on
memqcache_total_size = 2000MB # Max size of all cache entries.
memqcache_max_num_cache = 10000 # Max number of cached entries.

# SSL Configuration for connections from clients to Pgpool-II.
# IMPORTANT: This is for client-to-pgpool connections.
# For full security, Pgpool-II to Postgres connections should also be SSL.
# Patroni can be configured for this.
ssl = on
ssl_key = '/etc/pgpool2/certs/server.key'
ssl_cert = '/etc/pgpool2/certs/server.crt'
ssl_ca_cert = '/etc/pgpool2/certs/server.crt' # For self-signed, it's the same.
ssl_ciphers = 'HIGH:!aNULL'

# Backend nodes are now discovered dynamically from Patroni's REST API.
# This removes the need to manually list them here.
backend_clustering_mode = 'streaming_replication'

# Authentication
enable_pool_hba = on

# Connection pooling settings
num_init_children = 50
connection_cache = on
load_balance_mode = on