name: chatapp-cluster

networks:
  pg_network:
    driver: bridge

services:
  # The etcd service is the backend for Patroni's distributed state management.
  etcd:
    image: bitnami/etcd:latest
    container_name: etcd
    hostname: etcd
    networks:
      - pg_network
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_DATA_DIR=/bitnami/etcd/data
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCD_NAME=etcd
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: always

  # A pool of identical PostgreSQL nodes managed by Patroni.
  pg-node-1:
    build:
      context: ./postgresql
      dockerfile: Dockerfile
    container_name: pg-node-1
    hostname: pg-node-1
    networks:
      - pg_network
    volumes:
      - ./postgresql/conf/patroni.yml:/etc/patroni.yml
      - ./postgresql/init/schema.sql:/etc/patroni/init.sql
      - ./postgresql/init/post_init.sh:/etc/patroni/post_init.sh
      - ./postgresql/data/pg_data_1:/pgdata/data
      - ./postgresql/passwords/db.txt:/run/secrets/db_password
      - ./postgresql/passwords/repl.txt:/run/secrets/repl_password
    environment:
      - PATRONI_NAME=pg-node-1
      - PATRONI_SCOPE=chat-db-cluster
      - PATRONI_RESTAPI_CONNECT_ADDRESS=pg-node-1:8008
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=pg-node-1:5432
      - PATRONI_POSTGRESQL_DATA_DIR=/pgdata/data
      - PGUSER=appuser
      - PGPASSWORD_FILE=/run/secrets/db_password
    depends_on:
      - etcd
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '12'
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "gosu postgres /usr/lib/postgresql/16/bin/pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 60
    entrypoint:
      - "sh"
      - "-c"
      - |
        chown -R postgres:postgres /pgdata/data &&
        chmod 0700 /pgdata/data &&
        exec gosu postgres patroni /etc/patroni.yml

  pg-node-2:
    build:
      context: ./postgresql
      dockerfile: Dockerfile
    container_name: pg-node-2
    hostname: pg-node-2
    networks:
      - pg_network
    volumes:
      - ./postgresql/conf/patroni.yml:/etc/patroni.yml
      - ./postgresql/init/schema.sql:/etc/patroni/init.sql
      - ./postgresql/init/post_init.sh:/etc/patroni/post_init.sh
      - ./postgresql/data/pg_data_2:/pgdata/data
      - ./postgresql/passwords/db.txt:/run/secrets/db_password
      - ./postgresql/passwords/repl.txt:/run/secrets/repl_password
    environment:
      - PATRONI_NAME=pg-node-2
      - PATRONI_SCOPE=chat-db-cluster
      - PATRONI_RESTAPI_CONNECT_ADDRESS=pg-node-2:8008
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=pg-node-2:5432
      - PATRONI_POSTGRESQL_DATA_DIR=/pgdata/data
      - PGUSER=appuser
      - PGPASSWORD_FILE=/run/secrets/db_password
    depends_on:
      - etcd
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '12'
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "gosu postgres /usr/lib/postgresql/16/bin/pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 60
    entrypoint:
      - "sh"
      - "-c"
      - |
        chown -R postgres:postgres /pgdata/data &&
        chmod 0700 /pgdata/data &&
        exec gosu postgres patroni /etc/patroni.yml

  pg-node-3:
    build:
      context: ./postgresql
      dockerfile: Dockerfile
    container_name: pg-node-3
    hostname: pg-node-3
    networks:
      - pg_network
    volumes:
      - ./postgresql/conf/patroni.yml:/etc/patroni.yml
      - ./postgresql/init/schema.sql:/etc/patroni/init.sql
      - ./postgresql/init/post_init.sh:/etc/patroni/post_init.sh
      - ./postgresql/data/pg_data_3:/pgdata/data
      - ./postgresql/passwords/db.txt:/run/secrets/db_password
      - ./postgresql/passwords/repl.txt:/run/secrets/repl_password
    environment:
      - PATRONI_NAME=pg-node-3
      - PATRONI_SCOPE=chat-db-cluster
      - PATRONI_RESTAPI_CONNECT_ADDRESS=pg-node-3:8008
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_ETCD3_HOSTS=etcd:2379
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=pg-node-3:5432
      - PATRONI_POSTGRESQL_DATA_DIR=/pgdata/data
      - PGUSER=appuser
      - PGPASSWORD_FILE=/run/secrets/db_password
    depends_on:
      - etcd
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '12'
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "gosu postgres /usr/lib/postgresql/16/bin/pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 60
    entrypoint:
      - "sh"
      - "-c"
      - |
        chown -R postgres:postgres /pgdata/data &&
        chmod 0700 /pgdata/data &&
        exec gosu postgres patroni /etc/patroni.yml

  # Pgpool-II, now configured to work with Patroni.
  pgpool:
    build:
      context: ./pgpool
      dockerfile: Dockerfile
    container_name: pgpool
    hostname: pgpool
    networks:
      - pg_network
    ports:
      - "9999:9999"
    volumes:
      - ./pgpool/conf/pgpool.conf:/etc/pgpool2/pgpool.conf
      - ./pgpool/conf/pool_hba.conf:/etc/pgpool2/pool_hba.conf
      - ./pgpool/conf/pool_passwd:/etc/pgpool2/pool_passwd
      - ./pgpool/certs:/etc/pgpool2/certs
      - ./pgpool/passwords/pgpool.txt:/run/secrets/pgpool_password
    depends_on:
      pg-node-1:
        condition: service_healthy
      pg-node-2:
        condition: service_healthy
      pg-node-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    restart: always